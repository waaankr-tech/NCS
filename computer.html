<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>تفاصيل خدمات الحاسوب | Nashwan CS</title>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Cairo', sans-serif;
      background: #f8fafc;
      color: #0f172a;
      overflow-x: hidden;
    }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 1000;
      background: rgba(255,255,255,0.9);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border-bottom: 1px solid #e2e8f0;
    }

    .nav {
      max-width: 1180px;
      height: 68px;
      margin: auto;
      padding: 0 22px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
    }

    .brand,
    .back-link {
      text-decoration: none;
      color: #0f172a;
      font-weight: 800;
    }

    .brand {
      font-size: 21px;
    }

    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: #2563eb;
      background: #eff6ff;
      border: 1px solid #dbeafe;
      border-radius: 999px;
      padding: 10px 14px;
      font-size: 14px;
    }

    .page {
      max-width: 1180px;
      margin: auto;
      padding: 46px 22px 70px;
    }

    .hero {
      display: grid;
      grid-template-columns: 1.03fr 0.97fr;
      gap: 22px;
      align-items: stretch;
      margin-bottom: 22px;
    }

    .hero-copy,
    .visual-card,
    .panel,
    .mini-card {
      background: #fff;
      border: 1px solid #e2e8f0;
      box-shadow: 0 22px 52px rgba(15,23,42,0.06);
    }

    .hero-copy {
      border-radius: 30px;
      padding: 34px;
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: #2563eb;
      background: #eff6ff;
      border-radius: 999px;
      padding: 8px 13px;
      font-size: 13px;
      font-weight: 900;
      margin-bottom: 16px;
    }

    h1 {
      font-size: 42px;
      line-height: 1.25;
      font-weight: 900;
      margin-bottom: 14px;
    }

    .lead {
      color: #475569;
      font-size: 17px;
      line-height: 1.9;
      margin-bottom: 24px;
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 9px;
      text-decoration: none;
      border-radius: 999px;
      padding: 13px 18px;
      font-size: 15px;
      font-weight: 800;
    }

    .btn-primary {
      color: #fff;
      background: #25d366;
      box-shadow: 0 16px 32px rgba(37,211,102,0.22);
    }

    .btn-light {
      color: #0f172a;
      background: #f8fafc;
      border: 1px solid #e2e8f0;
    }

    .visual-card {
      border-radius: 30px;
      padding: 24px;
      display: grid;
      gap: 16px;
      align-content: center;
    }

    .visual-card img {
      width: 100%;
      display: block;
      border-radius: 24px;
      background: #f8fafc;
      border: 1px solid #e2e8f0;
    }

    .status-row {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
    }

    .status-row div {
      min-height: 76px;
      border-radius: 18px;
      padding: 13px;
      background: #f8fafc;
      border: 1px solid #e2e8f0;
    }

    .status-row strong {
      display: block;
      color: #0f172a;
      font-size: 16px;
      font-weight: 900;
      margin-bottom: 4px;
    }

    .status-row small {
      color: #2563eb;
      font-size: 12px;
      line-height: 1.5;
      font-weight: 800;
    }

    .content-grid {
      display: grid;
      grid-template-columns: 1fr 0.72fr;
      gap: 22px;
      align-items: start;
    }

    .panel,
    .mini-card {
      border-radius: 26px;
      padding: 28px;
    }

    .panel h2 {
      font-size: 25px;
      line-height: 1.35;
      margin-bottom: 16px;
    }

    .included {
      display: grid;
      gap: 12px;
    }

    .included li {
      list-style: none;
      display: flex;
      align-items: flex-start;
      gap: 10px;
      color: #334155;
      font-size: 15px;
      line-height: 1.8;
    }

    .included i {
      color: #16a34a;
      margin-top: 6px;
      flex-shrink: 0;
    }

    .side {
      display: grid;
      gap: 16px;
    }

    .mini-card h3 {
      font-size: 18px;
      font-weight: 900;
      margin-bottom: 10px;
    }

    .mini-card p,
    .mini-card li {
      color: #475569;
      font-size: 14px;
      line-height: 1.75;
    }

    .mini-card ul {
      display: grid;
      gap: 8px;
      padding: 0;
    }

    .mini-card li {
      list-style: none;
      display: flex;
      gap: 8px;
    }

    .mini-card li::before {
      content: "";
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: #2563eb;
      margin-top: 10px;
      flex-shrink: 0;
    }

    .service-list {
      margin-top: 22px;
      display: grid;
      grid-template-columns: repeat(6, 1fr);
      gap: 12px;
    }

    .service-chip {
      text-decoration: none;
      color: #0f172a;
      background: #fff;
      border: 1px solid #e2e8f0;
      border-radius: 16px;
      padding: 12px;
      font-size: 13px;
      font-weight: 800;
      text-align: center;
      transition: 0.2s ease;
    }

    .service-chip:hover,
    .service-chip.active {
      color: #2563eb;
      border-color: #bfdbfe;
      background: #eff6ff;
    }

    @media (max-width: 900px) {
      .hero,
      .content-grid {
        grid-template-columns: 1fr;
      }

      .service-list {
        grid-template-columns: repeat(2, 1fr);
      }
    }

    @media (max-width: 620px) {
      .nav {
        height: auto;
        padding: 14px 18px;
        flex-direction: column;
        align-items: stretch;
      }

      .brand,
      .back-link {
        justify-content: center;
        text-align: center;
      }

      .page {
        padding: 28px 16px 50px;
      }

      .hero-copy,
      .visual-card,
      .panel,
      .mini-card {
        border-radius: 20px;
        padding: 22px;
      }

      h1 {
        font-size: 30px;
      }

      .lead {
        font-size: 15px;
      }

      .status-row,
      .service-list {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <header class="topbar">
    <div class="nav">
      <a href="index.html#computer" class="brand">Nashwan CS</a>
      <a href="index.html#computer" class="back-link"><i class="fa-solid fa-arrow-right"></i> رجوع لقسم الحاسوب</a>
    </div>
  </header>

  <main class="page">
    <section class="hero">
      <div class="hero-copy">
        <div class="eyebrow"><i id="serviceIcon" class="fa-solid fa-laptop"></i><span id="serviceLabel">خدمات الحاسوب</span></div>
        <h1 id="serviceTitle">تفاصيل خدمة الحاسوب</h1>
        <p class="lead" id="serviceLead">اختر خدمة من قسم الحاسوب لعرض التفاصيل.</p>
        <div class="actions">
          <a href="#" class="btn btn-primary" id="whatsappBtn" target="_blank">
            <i class="fa-brands fa-whatsapp"></i>
            اطلب الخدمة عبر واتساب
          </a>
          <a href="index.html#contact" class="btn btn-light">
            <i class="fa-solid fa-headset"></i>
            طرق التواصل
          </a>
        </div>
      </div>

      <div class="visual-card">
        <img id="serviceImage" src="computer-hardware.svg" alt="صورة توضيحية لخدمة الحاسوب">
        <div class="status-row" id="statusRow"></div>
      </div>
    </section>

    <section class="content-grid">
      <div class="panel">
        <h2>شنو تشمل الخدمة؟</h2>
        <ul class="included" id="includedList"></ul>
      </div>

      <aside class="side">
        <div class="mini-card">
          <h3>مناسب لمن؟</h3>
          <p id="bestFor">الأفراد وأجهزة العمل والدراسة.</p>
        </div>

        <div class="mini-card">
          <h3>ملاحظات قبل الخدمة</h3>
          <ul id="notesList"></ul>
        </div>
      </aside>
    </section>

    <nav class="service-list" id="serviceList" aria-label="خدمات الحاسوب"></nav>
  </main>

  <script>
    const whatsappNumber = "9647734449499";
    const services = {
      diagnosis: {
        label: "فحص الأعطال",
        title: "فحص أعطال اللابتوب والكمبيوتر",
        icon: "fa-solid fa-stethoscope",
        image: "computer-hardware.svg",
        lead: "تشخيص سبب المشكلة قبل الإصلاح: بطء، حرارة، توقف مفاجئ، شاشة، بطارية، شاحن، هارد، رام، أو مشاكل تشغيل.",
        status: ["تشخيص", "تقرير واضح", "اقتراح حل"],
        included: ["فحص أولي للأعراض وتحديد هل المشكلة هاردوير أو سوفتوير.", "مراجعة حرارة الجهاز وأداء التخزين والرام حسب الحاجة.", "توضيح القطعة أو الإعداد الذي يسبب المشكلة قبل أي تبديل.", "اقتراح حل مناسب حسب ميزانيتك وحالة الجهاز."],
        bestFor: "مناسب لأي جهاز فيه مشكلة غير واضحة أو تكرر أعطال بدون معرفة السبب.",
        notes: ["لا يتم تبديل أي قطعة بدون موافقتك.", "بعض الأعطال تحتاج فحص حضوري للجهاز."],
        message: "مرحبا اريد فحص عطل بالحاسوب"
      },
      upgrade: {
        label: "ترقية SSD/RAM",
        title: "ترقية SSD و RAM لتحسين سرعة الجهاز",
        icon: "fa-solid fa-memory",
        image: "computer-hardware.svg",
        lead: "اختيار ترقية مناسبة للجهاز وتركيبها حتى يتحسن الإقلاع وفتح البرامج والعمل اليومي.",
        status: ["SSD", "RAM", "نقل بيانات"],
        included: ["فحص قابلية الجهاز للترقية.", "اقتراح سعة SSD أو RAM مناسبة لاستخدامك.", "تركيب القطعة وتجربة التشغيل.", "نقل النظام أو الملفات إذا كان ذلك مناسباً وممكناً."],
        bestFor: "مناسب للأجهزة البطيئة، اللابتوبات القديمة، وأجهزة الدراسة والعمل المكتبي.",
        notes: ["نوع القطعة يعتمد على موديل الجهاز.", "يفضل أخذ نسخة احتياطية قبل نقل البيانات."],
        message: "مرحبا اريد ترقية SSD او RAM"
      },
      cooling: {
        label: "صيانة الحرارة",
        title: "تنظيف وصيانة حرارة الجهاز",
        icon: "fa-solid fa-temperature-half",
        image: "computer-hardware.svg",
        lead: "تنظيف الغبار وفحص المروحة وتبديل المعجون الحراري عند الحاجة لتقليل الحرارة والتعليق.",
        status: ["تنظيف", "مروحة", "معجون"],
        included: ["فحص علامات الحرارة العالية والتوقف المفاجئ.", "تنظيف فتحات التهوية والغبار حسب نوع الجهاز.", "فحص صوت المروحة وحركتها.", "تبديل المعجون الحراري إذا كان ضرورياً ومناسباً."],
        bestFor: "مناسب للأجهزة التي تسخن، تطفي فجأة، يصير صوت المروحة عالي، أو يضعف أداؤها أثناء الاستخدام.",
        notes: ["بعض الأجهزة تحتاج فتح احترافي حتى لا تتضرر الكليبات.", "إذا المروحة تالفة قد تحتاج تبديل."],
        message: "مرحبا اريد تنظيف وصيانة حرارة للجهاز"
      },
      format: {
        label: "تنصيب Windows",
        title: "فورمات وتنصيب Windows بشكل مرتب",
        icon: "fa-brands fa-windows",
        image: "computer-software.svg",
        lead: "تنصيب نظام نظيف، ضبط الأساسيات، وتجهيز الجهاز للاستخدام بدون فوضى برامج غير ضرورية.",
        status: ["Windows", "تقسيم", "إعداد"],
        included: ["حفظ الملفات المهمة قبل الفورمات حسب الاتفاق.", "تنصيب Windows مناسب للجهاز.", "ضبط اللغة والمنطقة والتحديثات الأساسية.", "تقسيم الهارد بشكل مرتب إذا احتجت."],
        bestFor: "مناسب بعد بطء شديد، فايروسات، مشاكل نظام، أو عند شراء جهاز جديد/مستعمل.",
        notes: ["الفورمات قد يحذف البيانات إذا ما أخذنا نسخة.", "التفعيل يعتمد على نوع النسخة والترخيص المتوفر."],
        message: "مرحبا اريد فورمات وتنصيب Windows"
      },
      drivers: {
        label: "تعاريف وبرامج",
        title: "تثبيت التعاريف والبرامج الأساسية",
        icon: "fa-solid fa-microchip",
        image: "computer-software.svg",
        lead: "تعريف الصوت والشاشة والشبكة والطابعة عند الحاجة، وتنصيب البرامج اليومية بطريقة مرتبة.",
        status: ["Drivers", "Office", "Tools"],
        included: ["فحص التعاريف الناقصة أو الخاطئة.", "تثبيت تعريفات الشبكة والصوت والشاشة حسب الجهاز.", "تنصيب برامج أساسية للعمل والدراسة.", "اختبار الإنترنت والصوت والشاشة بعد التعريف."],
        bestFor: "مناسب بعد الفورمات أو عندما لا يعمل الصوت أو الواي فاي أو كارت الشاشة بشكل صحيح.",
        notes: ["بعض التعاريف تحتاج موديل الجهاز بالضبط.", "نستخدم مصادر مناسبة ونبتعد عن البرامج المزعجة."],
        message: "مرحبا اريد تعاريف وبرامج اساسية"
      },
      setup: {
        label: "تجهيز كامل",
        title: "تجهيز جهاز كامل للعمل أو الدراسة",
        icon: "fa-solid fa-briefcase",
        image: "computer-software.svg",
        lead: "باقة تجهيز كاملة تشمل النظام والبرامج والتعاريف والحماية والإعدادات حسب استخدامك.",
        status: ["نظام", "برامج", "حماية"],
        included: ["تجهيز Windows والتعاريف الأساسية.", "تنصيب Office وبرامج الدراسة أو العمل المطلوبة.", "ضبط حماية أساسية ونسخ احتياطي إذا احتجت.", "ترتيب سطح المكتب والملفات المهمة بشكل واضح."],
        bestFor: "مناسب للطلاب، الموظفين، أصحاب المكاتب، ومن يريد جهاز جاهز بدون تعب.",
        notes: ["نحدد البرامج المطلوبة قبل البدء.", "الأجهزة الضعيفة جداً قد تحتاج ترقية SSD/RAM للحصول على نتيجة أفضل."],
        message: "مرحبا اريد تجهيز جهاز كامل للعمل او الدراسة"
      }
    };

    const params = new URLSearchParams(window.location.search);
    const key = services[params.get("service")] ? params.get("service") : "diagnosis";
    const current = services[key];

    document.getElementById("serviceLabel").textContent = current.label;
    document.getElementById("serviceTitle").textContent = current.title;
    document.getElementById("serviceLead").textContent = current.lead;
    document.getElementById("serviceIcon").className = current.icon;
    document.getElementById("serviceImage").src = current.image;
    document.getElementById("statusRow").innerHTML = current.status.map(item => `<div><strong>${item}</strong><small>ضمن خطوات الخدمة</small></div>`).join("");
    document.getElementById("includedList").innerHTML = current.included.map(item => `<li><i class="fa-solid fa-circle-check"></i><span>${item}</span></li>`).join("");
    document.getElementById("bestFor").textContent = current.bestFor;
    document.getElementById("notesList").innerHTML = current.notes.map(item => `<li>${item}</li>`).join("");
    document.getElementById("whatsappBtn").href = `https://wa.me/${whatsappNumber}?text=${encodeURIComponent(current.message)}`;

    document.getElementById("serviceList").innerHTML = Object.entries(services).map(([serviceKey, service]) => {
      const active = serviceKey === key ? " active" : "";
      return `<a class="service-chip${active}" href="computer.html?service=${serviceKey}">${service.label}</a>`;
    }).join("");
  </script>
</body>
</html>
